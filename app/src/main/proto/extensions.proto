syntax = "proto3";

option java_package = "org.midorinext.android.extensions.store";
option java_multiple_files = true;

message InstalledExtensionProto {
  string id = 1;
  string name = 2;
  string description = 3;
  string version = 4;
  string icon_url = 5;
  string download_url = 6;
  bool enabled = 7;
  int64 installed_at = 8;
}

message ExtensionStorePreferences {
  repeated InstalledExtensionProto extensions = 1;
}

