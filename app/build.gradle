// Mozac 151+: geckoview-omni bundles glean-native as a capability, causing a conflict
// with the standalone glean-native pulled by support-appservices → errorsupport → glean.
// Tell Gradle to always pick geckoview-omni as the provider for that capability.
configurations.configureEach {
    resolutionStrategy {
        capabilitiesResolution {
            withCapability('org.mozilla.telemetry:glean-native') { details ->
                def toSelect = details.candidates.find { it.id.module == 'geckoview-omni' }
                if (toSelect) details.select(toSelect)
            }
        }
    }
}

def readConfigValue = { String key, String fallback = null ->
    project.findProperty(key) ?: System.getenv(key) ?: System.getenv(key.toUpperCase()) ?: fallback
}

def parseIntConfig = { String key, Integer fallback ->
    def value = readConfigValue(key, null)
    if (value == null || value.toString().trim().isEmpty()) {
        return fallback
    }
    try {
        return Integer.parseInt(value.toString())
    } catch (NumberFormatException ignored) {
        throw new GradleException("Invalid integer for '${key}': '${value}'")
    }
}

def readVersionCodeFromFile = {
    def versionFile = rootProject.file("version.properties")
    if (!versionFile.exists()) {
        return 2026000083
    }

    def properties = new Properties()
    versionFile.withInputStream { stream -> properties.load(stream) }
    def rawValue = properties.getProperty("PLAYSTORE_VERSION_CODE", "2026000080")
    try {
        return Integer.parseInt(rawValue)
    } catch (NumberFormatException ignored) {
        throw new GradleException("Invalid PLAYSTORE_VERSION_CODE in version.properties: '${rawValue}'")
    }
}

def shouldAutoBumpVersionCode = {
    if (gradle.startParameter.isDryRun()) {
        return false
    }
    def taskNames = gradle.startParameter.taskNames.collect { it.toLowerCase() }
    taskNames.any { taskName ->
        taskName.contains("assemble") ||
                taskName.contains("bundle") ||
                taskName.contains("install") ||
                taskName.contains("compile")
    }
}

def resolvePlaystoreVersionCode = {
    def explicitVersionCode = readConfigValue("playstore_version_code", null)
    if (explicitVersionCode != null && !explicitVersionCode.toString().trim().isEmpty()) {
        return parseIntConfig("playstore_version_code", 2026000080)
    }

    def persistedVersionCode = readVersionCodeFromFile()
    if (!shouldAutoBumpVersionCode()) {
        return persistedVersionCode
    }

    def nextVersionCode = persistedVersionCode + 1
    def versionFile = rootProject.file("version.properties")
    def properties = new Properties()
    properties.setProperty("PLAYSTORE_VERSION_CODE", nextVersionCode.toString())
    versionFile.withOutputStream { stream ->
        properties.store(stream, "Auto-generated. Incremented on each compilation build.")
    }
    return nextVersionCode
}

def maxPlayVersionCode = 2_100_000_000
def preLimitVersionCode = 2_090_000_000
def configuredPlaystoreVersionCode = resolvePlaystoreVersionCode()

android {
    // AGP 8.13 can fail preBundle when resource shrinking runs with multi-APK ABI splits.
    // Keep ABI splits for APK builds, but disable them when a bundle task is requested.
    def requestedTasks = gradle.startParameter.taskNames.collect { it.toLowerCase() }
    def isBundleBuild = requestedTasks.any { it.contains("bundle") }
    def isDebugApkBuild = requestedTasks.any { it.contains("debug") }
    def isOriginalPlaystoreApkBuild = requestedTasks.any {
        it.contains("originalplaystore") && !it.contains("bundle")
    }
    // Original Play Store APK builds always publish a space-efficient x86_64 artifact beside
    // the universal APK. Keep the existing ARM splits so current distribution stays compatible.
    def splitAbis = (project.findProperty("fullAbiBuild") == "true")
            ? ["armeabi-v7a", "arm64-v8a", "x86", "x86_64"]
            : ((isDebugApkBuild || isOriginalPlaystoreApkBuild)
                ? ["armeabi-v7a", "arm64-v8a", "x86_64"]
                : ["armeabi-v7a", "arm64-v8a"])

    namespace 'org.midorinext.android'
    compileSdk 36
    defaultConfig {
        applicationId "org.midorinext.android"
        minSdk 26
        targetSdk 36
        versionCode configuredPlaystoreVersionCode
        versionName "11.8.9"

        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
        vectorDrawables {
            useSupportLibrary true
        }

        ksp {
            arg("room.schemaLocation", "$projectDir/schemas")
        }

        resourceConfigurations += ["en", "fr", "de", "es", "it"]
        buildConfigField("String", "COMPANION_ID", "\"${rootProject.ext.companion_id}\"")
    }

    bundle {
        density {
            enableSplit true
        }
        abi {
            enableSplit true
        }
        language {
            enableSplit = false
        }
    }

    splits {
        abi {
            enable !isBundleBuild
            if (!isBundleBuild) {
                reset()
                include(*splitAbis)
            }
            // Release/OEM builds keep their universal APK. Original Play Store debug also emits
            // one so its debug and release artifact sets have the same universal + x86_64 pair.
            universalApk !isDebugApkBuild || isOriginalPlaystoreApkBuild
        }
    }

    signingConfigs {
        release {
            storeFile file(readConfigValue("keystore_playstore_path", "${rootProject.projectDir}/upload-keystore.jks"))
            storePassword readConfigValue("keystore_playstore_password", 'Hornela21@.*')
            keyAlias readConfigValue("keystore_playstore_alias", 'amelia2024')
            keyPassword readConfigValue("keystore_playstore_key_password", 'Hornela21@.*')
        }
    }

    buildTypes {
        debug {
            getIsDefault().set(true)
            applicationIdSuffix ".debug"
        }
        release {
            // Shrink bytecode and resources to reduce final artifact size.
            minifyEnabled true
            shrinkResources true
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
            signingConfig signingConfigs.release
        }
    }

    flavorDimensions += ["version", "target"]
    productFlavors {
        def addConstantTo = {target, constantName, constantValue ->
            target.manifestPlaceholders += [ (constantName):constantValue ]
            target.buildConfigField "String", "${constantName}", "\"${constantValue}\""
        }
        original {
            dimension "version"
            getIsDefault().set(true)
            buildConfigField("String", "QWANT_BASE_URL", '"https://astiango.com"')
            buildConfigField("String", "QWANT_API_BASE_URL", '"https://api.qwant.com/v3"')
            addConstantTo(owner, "WIDGET_ACTION", "org.midorinext.android.intent.action.WIDGET")
        }
        kids {
            dimension "version"
            applicationId "com.midorikids.mobile"
            buildConfigField("String", "QWANT_BASE_URL", '"https://www.astiangojunior.com"')
            buildConfigField("String", "QWANT_API_BASE_URL", '"https://api.qwant.com/v3/egp/search"')
