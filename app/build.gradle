protobuf {
    protoc {
        def protoVersion = "4.34.0"
        // Protobuf compiler is not supported for Apple M1 architecture,
        // fallback to specific 'protoc_platform' version if specify
        if (project.hasProperty('protoc_platform')) {
            artifact = "com.google.protobuf:protoc:$protoVersion:${protoc_platform}"
        } else {
            artifact = "com.google.protobuf:protoc:$protoVersion"
        }
    }

    // Generates the java Protobuf-lite code for the Protobufs in this project. See
    // https://github.com/google/protobuf-gradle-plugin#customizing-protobuf-compilation
    // for more information.
    generateProtoTasks {
        all().each { task ->
            task.builtins {
                java {
                    option 'lite'
                }
            }
        }
    }
}

tasks.register("validatePlaystoreReleaseConfig") {
    group = "verification"
    description = "Validates signing and versionCode constraints before publishing to Google Play"
    doLast {
        if (configuredPlaystoreVersionCode <= 0) {
            throw new GradleException("playstore_version_code must be a positive integer")
        }
        if (configuredPlaystoreVersionCode >= maxPlayVersionCode) {
            throw new GradleException(
                    "playstore_version_code (${configuredPlaystoreVersionCode}) exceeds Google Play max (${maxPlayVersionCode - 1})"
            )
        }
        if (configuredPlaystoreVersionCode >= preLimitVersionCode) {
            throw new GradleException(
                    "playstore_version_code (${configuredPlaystoreVersionCode}) is too close to Google Play max; choose a lower strategy"
            )
        }

        def keystorePath = readConfigValue("keystore_playstore_path", "${rootProject.projectDir}/upload-keystore.jks")
        if (!file(keystorePath).exists()) {
            throw new GradleException("Upload keystore not found at: ${keystorePath}")
        }
    }
}

tasks.matching { it.name == "bundleOriginalPlaystoreRelease" }.configureEach {
    dependsOn("validatePlaystoreReleaseConfig")
}
